name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - ".claude/**"
      - ".cursor/**"
      - "**/*.md"
      - ".editorconfig"
      - ".gitattributes"
      - ".gitignore"
      - "LICENSE*"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - ".claude/**"
      - ".cursor/**"
      - "**/*.md"
      - ".editorconfig"
      - ".gitattributes"
      - ".gitignore"
      - "LICENSE*"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  linux_clippy_test:
    name: linux (clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-stable
          cache-bin: "false"
      - run: cargo clippy --all-targets --no-default-features --features dev-fast -- -D warnings

  doc:
    name: doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: actions/cache@v5
        with:
          path: ~/.quint
          key: quint-evaluator-${{ runner.os }}-v0.6.0
      - run: npm install -g @informalsystems/quint@0.32.0
      - run: scripts/install-quint-evaluator.sh
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-stable
          cache-bin: "false"
      - name: cargo doc
        run: cargo doc --no-deps --no-default-features --features dev-fast
        env:
          RUSTDOCFLAGS: -D warnings

  quint:
    name: quint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: npm install -g @informalsystems/quint@0.32.0
      - run: scripts/check-quint-specs.sh

  test:
    name: test (${{ matrix.os }} / ${{ matrix.rust }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust: stable
          - os: ubuntu-latest
            rust: "1.95"
    runs-on: ${{ matrix.os }}
    env:
      CARGO_BUILD_JOBS: 2
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: actions/cache@v5
        with:
          path: ~/.quint
          key: quint-evaluator-${{ runner.os }}-v0.6.0
      - run: npm install -g @informalsystems/quint@0.32.0
      - run: scripts/install-quint-evaluator.sh
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest@0.9
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.rust }}
          cache-bin: "false"
      - name: Run parallel test suite
        run: cargo nextest run -j 4 --all --locked --no-default-features --features dev-fast -E 'not binary(perf_projector_phase2)'
      - name: Run projector performance regressions without contention
        run: cargo test --locked --no-default-features --features dev-fast --test perf_projector_phase2 -- --test-threads=1
      - run: cargo test --doc --all --locked --no-default-features --features dev-fast

  audit:
    name: audit + deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit, cargo-deny
      - run: cargo audit
      - run: cargo deny --manifest-path Cargo.toml check --config .cargo/deny.toml

  ci:
    name: CI
    needs: [fmt, linux_clippy_test, doc, quint, test, audit]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: All jobs succeeded
        run: |
          test "${{ needs.fmt.result }}" = "success"
          test "${{ needs.linux_clippy_test.result }}" = "success"
          test "${{ needs.doc.result }}" = "success"
          test "${{ needs.quint.result }}" = "success"
          test "${{ needs.test.result }}" = "success"
          test "${{ needs.audit.result }}" = "success"

  push_release_tag:
    name: push release tag
    needs: [ci]
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PUSH_TOKEN != '' && secrets.RELEASE_PUSH_TOKEN || github.token }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Bump Cargo.toml version to match next tag
        id: bump
        run: |
          # Determine what tag will be pushed by the script
          DRY_OUTPUT=$(KIZEN_ROOT="$GITHUB_WORKSPACE" CARGO_TOML="$GITHUB_WORKSPACE/Cargo.toml" bash "${GITHUB_WORKSPACE}/scripts/push-release-tag.sh" --dry-run 2>/dev/null)
          NEXT_TAG="${DRY_OUTPUT#RELEASE_TAG=}"
          NEXT_VERSION="${NEXT_TAG#v}"
          echo "Next tag: $NEXT_TAG, version: $NEXT_VERSION" >&2
          echo "next_tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

          CURRENT_VERSION=$(awk -F'"' '/^version = / {print $2; exit}' Cargo.toml)
          if [ "$CURRENT_VERSION" != "$NEXT_VERSION" ]; then
            echo "Bumping Cargo.toml from $CURRENT_VERSION to $NEXT_VERSION"
            sed -i "s/^version = \"$CURRENT_VERSION\"/version = \"$NEXT_VERSION\"/" Cargo.toml
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version already matches: $CURRENT_VERSION" >&2
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Update Cargo.lock
        if: steps.bump.outputs.bumped == 'true'
        run: cargo generate-lockfile
      - name: Open version bump PR
        if: steps.bump.outputs.bumped == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN }}
          NEXT_TAG: ${{ steps.bump.outputs.next_tag }}
          NEXT_VERSION: ${{ steps.bump.outputs.next_version }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Set secret RELEASE_PUSH_TOKEN so CI can open the release bump PR and trigger required checks." >&2
            exit 1
          fi
          branch="release/${NEXT_TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to ${NEXT_VERSION}" -m "Prepare ${NEXT_TAG}; CI will push the tag after this PR lands."
          git push --force-with-lease \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:${branch}"
          body="$(mktemp)"
          {
            echo "Automated release version bump for ${NEXT_TAG}."
            echo
            echo "After this PR merges, the protected-branch CI run will push ${NEXT_TAG}."
          } > "$body"
          if gh pr view "$branch" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh pr edit "$branch" --repo "$GITHUB_REPOSITORY" \
              --title "chore: bump version to ${NEXT_VERSION}" \
              --body-file "$body"
          else
            gh pr create --repo "$GITHUB_REPOSITORY" \
              --head "$branch" \
              --base "${{ github.event.repository.default_branch }}" \
              --title "chore: bump version to ${NEXT_VERSION}" \
              --body-file "$body"
          fi
      - name: Push version tag when needed
        if: steps.bump.outputs.bumped == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PUSH_USER: ${{ github.repository_owner }}
          RELEASE_PUSH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN }}
        run: |
          eval "$(bash "${GITHUB_WORKSPACE}/scripts/push-release-tag.sh")"
