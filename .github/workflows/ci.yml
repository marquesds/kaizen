name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  linux_clippy_test:
    name: linux (clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/cache@v4
        with:
          path: ~/.quint
          key: quint-evaluator-${{ runner.os }}-v0.6.0
      - run: npm install -g @informalsystems/quint@0.32.0
      - run: scripts/install-quint-evaluator.sh
      - run: scripts/check-quint-specs.sh
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-stable
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all --locked

  doc:
    name: doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-stable
      - name: cargo doc
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  test:
    name: test (${{ matrix.os }} / ${{ matrix.rust }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            rust: stable
          - os: ubuntu-latest
            rust: "1.95"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/cache@v4
        with:
          path: ~/.quint
          key: quint-evaluator-${{ runner.os }}-v0.6.0
      - run: npm install -g @informalsystems/quint@0.32.0
      - run: scripts/install-quint-evaluator.sh
      - run: scripts/check-quint-specs.sh
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.rust }}
      - run: cargo test --all --locked

  audit:
    name: audit + deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit, cargo-deny
      - run: cargo audit
      - run: cargo deny --manifest-path Cargo.toml check --config .cargo/deny.toml

  ci:
    name: CI
    needs: [fmt, linux_clippy_test, doc, test, audit]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: All jobs succeeded
        run: |
          test "${{ needs.fmt.result }}" = "success"
          test "${{ needs.linux_clippy_test.result }}" = "success"
          test "${{ needs.doc.result }}" = "success"
          test "${{ needs.test.result }}" = "success"
          test "${{ needs.audit.result }}" = "success"

  push_release_tag:
    name: push release tag
    needs: [ci]
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push version tag when needed
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN }}
          RELEASE_PUSH_USER: ${{ github.repository_owner }}
          RELEASE_PUSH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN }}
        run: |
          VERSION=$(awk -F'"' '/^version = / {print $2; exit}' Cargo.toml)
          HEAD_SHA=$(git rev-parse HEAD)
          SHORT_SHA=$(git rev-parse --short=12 HEAD)
          EXACT_TAG="v${VERSION}"
          DERIVED_TAG="v${VERSION}-ci.${SHORT_SHA}"
          PUSH_URL="https://${RELEASE_PUSH_USER}:${RELEASE_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          RELEASE_TAG=""

          git fetch --force --tags origin

          if git rev-parse "$EXACT_TAG^{commit}" >/dev/null 2>&1; then
            TAG_SHA=$(git rev-parse "$EXACT_TAG^{commit}")
            if [ "$TAG_SHA" = "$HEAD_SHA" ]; then
              echo "$EXACT_TAG already points at $HEAD_SHA"
              RELEASE_TAG="$EXACT_TAG"
            else
              echo "$EXACT_TAG already points at $TAG_SHA; using $DERIVED_TAG for this commit"

              if git rev-parse "$DERIVED_TAG^{commit}" >/dev/null 2>&1; then
                DERIVED_SHA=$(git rev-parse "$DERIVED_TAG^{commit}")
                if [ "$DERIVED_SHA" = "$HEAD_SHA" ]; then
                  echo "$DERIVED_TAG already points at $HEAD_SHA"
                  RELEASE_TAG="$DERIVED_TAG"
                else
                  echo "$DERIVED_TAG already points at $DERIVED_SHA, not $HEAD_SHA" >&2
                  exit 1
                fi
              else
                git tag "$DERIVED_TAG" "$HEAD_SHA"
                git push "$PUSH_URL" "$DERIVED_TAG"
                RELEASE_TAG="$DERIVED_TAG"
              fi
            fi
          else
            git tag "$EXACT_TAG" "$HEAD_SHA"
            git push "$PUSH_URL" "$EXACT_TAG"
            RELEASE_TAG="$EXACT_TAG"
          fi

          sleep 10

          RELEASE_RUN_COUNT=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow Release \
            --branch "$RELEASE_TAG" \
            --limit 5 \
            --json databaseId \
            --jq 'length')

          if [ "$RELEASE_RUN_COUNT" -gt 0 ]; then
            echo "Release workflow already present for $RELEASE_TAG"
            exit 0
          fi

          echo "Dispatching Release workflow for $RELEASE_TAG"
          gh workflow run Release \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$RELEASE_TAG" \
            -f version="${RELEASE_TAG#v}"
