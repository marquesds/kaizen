name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - ".claude/**"
      - ".cursor/**"
      - "**/*.md"
      - ".editorconfig"
      - ".gitattributes"
      - ".gitignore"
      - "LICENSE*"
  pull_request:
    branches: [main, master]
    paths-ignore:
      - ".claude/**"
      - ".cursor/**"
      - "**/*.md"
      - ".editorconfig"
      - ".gitattributes"
      - ".gitignore"
      - "LICENSE*"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  linux_clippy_test:
    name: linux (clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/cache@v4
        with:
          path: ~/.quint
          key: quint-evaluator-${{ runner.os }}-v0.6.0
      - run: npm install -g @informalsystems/quint@0.32.0
      - run: scripts/install-quint-evaluator.sh
      - run: scripts/check-quint-specs.sh
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-stable
      - run: cargo clippy --all-targets -- -D warnings

  doc:
    name: doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-stable
      - name: cargo doc
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  test:
    name: test (${{ matrix.os }} / ${{ matrix.rust }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            rust: stable
          - os: ubuntu-latest
            rust: "1.95"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/cache@v4
        with:
          path: ~/.quint
          key: quint-evaluator-${{ runner.os }}-v0.6.0
      - run: npm install -g @informalsystems/quint@0.32.0
      - run: scripts/install-quint-evaluator.sh
      - run: scripts/check-quint-specs.sh
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.rust }}
      - run: cargo test --all --locked

  audit:
    name: audit + deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit, cargo-deny
      - run: cargo audit
      - run: cargo deny --manifest-path Cargo.toml check --config .cargo/deny.toml

  ci:
    name: CI
    needs: [fmt, linux_clippy_test, doc, test, audit]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: All jobs succeeded
        run: |
          test "${{ needs.fmt.result }}" = "success"
          test "${{ needs.linux_clippy_test.result }}" = "success"
          test "${{ needs.doc.result }}" = "success"
          test "${{ needs.test.result }}" = "success"
          test "${{ needs.audit.result }}" = "success"

  push_release_tag:
    name: push release tag
    needs: [ci]
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PUSH_TOKEN != '' && secrets.RELEASE_PUSH_TOKEN || github.token }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Bump Cargo.toml version to match next tag
        id: bump
        run: |
          # Determine what tag will be pushed by the script
          DRY_OUTPUT=$(KIZEN_ROOT="$GITHUB_WORKSPACE" CARGO_TOML="$GITHUB_WORKSPACE/Cargo.toml" bash "${GITHUB_WORKSPACE}/scripts/push-release-tag.sh" --dry-run 2>/dev/null)
          NEXT_TAG="${DRY_OUTPUT#RELEASE_TAG=}"
          NEXT_VERSION="${NEXT_TAG#v}"
          echo "Next tag: $NEXT_TAG, version: $NEXT_VERSION" >&2
          
          CURRENT_VERSION=$(awk -F'"' '/^version = / {print $2; exit}' Cargo.toml)
          if [ "$CURRENT_VERSION" != "$NEXT_VERSION" ]; then
            echo "Bumping Cargo.toml from $CURRENT_VERSION to $NEXT_VERSION"
            sed -i "s/^version = \"$CURRENT_VERSION\"/version = \"$NEXT_VERSION\"/" Cargo.toml
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version already matches: $CURRENT_VERSION" >&2
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Update Cargo.lock
        if: steps.bump.outputs.bumped == 'true'
        run: cargo metadata --locked --format-version 1 >/dev/null 2>&1 && cargo build || true
      - name: Commit version bump
        if: steps.bump.outputs.bumped == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to ${NEXT_VERSION}" -m "Auto-bump for release tag $NEXT_TAG [skip ci]"
          git push origin HEAD:${{ github.event.repository.default_branch }}
          # Update local checkout to include the pushed commit
          git fetch origin ${{ github.event.repository.default_branch }}
          git reset --hard origin/${{ github.event.repository.default_branch }}
      - name: Push version tag when needed
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PUSH_USER: ${{ github.repository_owner }}
          RELEASE_PUSH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN }}
        run: |
          eval "$(bash "${GITHUB_WORKSPACE}/scripts/push-release-tag.sh")"
