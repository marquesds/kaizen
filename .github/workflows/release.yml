name: Release

# Avoid overlapping duplicate runs when a tag both triggers on.push and push-release-tag dispatches
concurrency:
  group: release-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "e.g. 0.1.0 or 0.1.0-alpha.1 — must be same version line as Cargo.toml (MAJOR.MINOR) with PATCH >= Cargo.toml, or a prerelease tag whose base version matches that line"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  verify:
    name: verify version matches
    runs-on: ubuntu-latest
    outputs:
      cargo_version: ${{ steps.v.outputs.cargo_version }}
      notes_section: ${{ steps.v.outputs.notes_section }}
      release_version: ${{ steps.v.outputs.release_version }}
    steps:
      - uses: actions/checkout@v7
      - id: v
        env:
          DISPATCH_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || '' }}
        run: |
          CARGO_VER=$(awk -F'"' '/^version = / {print $2; exit}' Cargo.toml)
          echo "cargo_version=$CARGO_VER" >> "$GITHUB_OUTPUT"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            V="${DISPATCH_VERSION#v}"
            if [ -z "$V" ]; then
              echo "workflow_dispatch: version input is empty" >&2
              exit 1
            fi
            if ! echo "$CARGO_VER" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "Cargo.toml version must be MAJOR.MINOR.PATCH" >&2
              exit 1
            fi
            BASE="${V%%-*}"
            if ! echo "$BASE" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "input v${V} is not a valid version (MAJOR.MINOR.PATCH with optional -prerelease)" >&2
              exit 1
            fi
            IFS=. read -r c_maj c_min c_patch <<< "$CARGO_VER"
            IFS=. read -r t_maj t_min t_patch <<< "$BASE"
            if [ "$t_maj.$t_min" = "$c_maj.$c_min" ] && [ "$t_patch" -ge "$c_patch" ]; then
              echo "notes_section=$CARGO_VER" >> "$GITHUB_OUTPUT"
            else
              echo "input v${V} is not on the same version line as Cargo.toml ${CARGO_VER}" >&2
              exit 1
            fi
            echo "release_version=$V" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TAG="${GITHUB_REF#refs/tags/v}"
          if ! echo "$CARGO_VER" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Cargo.toml version must be MAJOR.MINOR.PATCH" >&2
            exit 1
          fi
          BASE="${TAG%%-*}"
          if ! echo "$BASE" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "tag v$TAG is not a valid vMAJOR.MINOR.PATCH (optional -prerelease)" >&2
            exit 1
          fi
          IFS=. read -r c_maj c_min c_patch <<< "$CARGO_VER"
          IFS=. read -r t_maj t_min t_patch <<< "$BASE"
          if [ "$t_maj.$t_min" = "$c_maj.$c_min" ] && [ "$t_patch" -ge "$c_patch" ]; then
            echo "notes_section=$CARGO_VER" >> "$GITHUB_OUTPUT"
            echo "release_version=$TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "tag v$TAG is not on the same version line as Cargo.toml $CARGO_VER" >&2
          exit 1

  build:
    name: build ${{ matrix.target }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
          cache-bin: "false"
      - name: Build
        run: |
          cargo build --release --locked --target ${{ matrix.target }} --bin kaizen \
            --features full
      - name: Package
        id: pkg
        run: |
          VERSION="${{ needs.verify.outputs.release_version }}"
          NAME="kaizen-v${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/${NAME}"
          cp "target/${{ matrix.target }}/release/kaizen" "dist/${NAME}/"
          cp README.md LICENSE CHANGELOG.md "dist/${NAME}/"
          tar -C dist -czf "dist/${NAME}.tar.gz" "${NAME}"
          ( cd dist && shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256" )
          echo "archive=dist/${NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "sha=dist/${NAME}.tar.gz.sha256" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: kaizen-${{ matrix.target }}
          path: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.pkg.outputs.sha }}

  release:
    name: github release
    needs: [verify, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Extract changelog entry
        id: changelog
        run: |
          SECTION="${{ needs.verify.outputs.notes_section }}"
          awk -v section="$SECTION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" section "\\]") { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "See [CHANGELOG.md](CHANGELOG.md)." > RELEASE_NOTES.md
          fi
      - name: Create GitHub release
        # softprops/action-gh-release returned 404 in this repo; `gh` with the same PAT succeeds.
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN }}
          IS_PRERELEASE: ${{ contains(needs.verify.outputs.release_version, '-') }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Set secret RELEASE_PUSH_TOKEN (PAT with repo scope, e.g. from gh auth token)" >&2
            exit 1
          fi
          VERSION="${{ needs.verify.outputs.release_version }}"
          ASSETS=()
          for f in dist/*.tar.gz dist/*.sha256; do
            if [ -f "$f" ]; then ASSETS+=("$f"); fi
          done
          if [ "${#ASSETS[@]}" -eq 0 ]; then
            echo "No dist assets (expected *.tar.gz and *.sha256)" >&2
            ls -la dist/ 2>&1 || true
            exit 1
          fi
          if gh release view "v${VERSION}" --repo "${{ github.repository }}" &>/dev/null; then
            echo "Release v${VERSION} exists; deleting before recreating with artifacts."
            gh release delete "v${VERSION}" --repo "${{ github.repository }}" --yes
          fi
          # --verify-tag: the git tag v* must already exist on GitHub
          if [ "${IS_PRERELEASE}" = "true" ]; then
            gh release create "v${VERSION}" "${ASSETS[@]}" --repo "${{ github.repository }}" \
              --title "v${VERSION}" --notes-file "$GITHUB_WORKSPACE/RELEASE_NOTES.md" \
              --verify-tag --prerelease
          else
            gh release create "v${VERSION}" "${ASSETS[@]}" --repo "${{ github.repository }}" \
              --title "v${VERSION}" --notes-file "$GITHUB_WORKSPACE/RELEASE_NOTES.md" \
              --verify-tag
          fi

  update-homebrew-tap:
    name: update homebrew-tap
    needs: [verify, build, release]
    runs-on: ubuntu-latest
    if: ${{ !contains(needs.verify.outputs.release_version, '-') }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Render formula and push to marquesds/homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.verify.outputs.release_version }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN is not set; skip Homebrew tap update (add repo secret to enable)."
            exit 0
          fi
          set -euo pipefail
          for f in \
            "dist/kaizen-v${VERSION}-aarch64-apple-darwin.tar.gz.sha256" \
            "dist/kaizen-v${VERSION}-x86_64-apple-darwin.tar.gz.sha256" \
            "dist/kaizen-v${VERSION}-aarch64-unknown-linux-gnu.tar.gz.sha256" \
            "dist/kaizen-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz.sha256"; do
            if [ ! -f "$f" ]; then
              echo "Missing artifact: $f" >&2
              ls -la dist/ >&2 || true
              exit 1
            fi
          done
          RENDERED="$(mktemp)"
          bash "$GITHUB_WORKSPACE/scripts/render-homebrew-tap-formula.sh" "$VERSION" "$GITHUB_WORKSPACE/dist" > "$RENDERED"
          git clone --depth=1 "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/marquesds/homebrew-tap.git" /tmp/homebrew-tap
          install -m0644 "$RENDERED" /tmp/homebrew-tap/Formula/kaizen-cli.rb
          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/kaizen-cli.rb
          if git diff --cached --exit-code; then
            echo "No formula changes; skip push."
            exit 0
          fi
          SHORT="${GITHUB_SHA:0:7}"
          git commit -m "bump kaizen-cli to v${VERSION}" -m "Synced from ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}@${SHORT}"
          git push origin HEAD:main

  publish-crate:
    name: publish to crates.io
    needs: [verify, release]
    if: ${{ !contains(needs.verify.outputs.release_version, '-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: v${{ needs.verify.outputs.release_version }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: publish
          cache-bin: "false"
      - name: Verify crate version
        run: |
          cargo_version=$(awk -F'"' '/^version = / {print $2; exit}' Cargo.toml)
          test "$cargo_version" = "${{ needs.verify.outputs.release_version }}"
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "Set secret CARGO_REGISTRY_TOKEN so CI can publish kaizen-cli to crates.io." >&2
            exit 1
          fi
          cargo publish --locked
