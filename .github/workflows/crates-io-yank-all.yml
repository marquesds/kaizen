name: crates.io yank published (manual)

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Must be exactly CONFIRM-YANK — yanks every published kaizen-cli version"
        required: true
        type: string

jobs:
  yank:
    if: ${{ github.event.inputs.confirmation == 'CONFIRM-YANK' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          set -euo pipefail
          UA='marquesds/kaizen crates-io-yank (https://github.com/marquesds/kaizen)'
          CRATE_JSON="$(curl -sSf \
            -H "User-Agent: ${UA}" \
            'https://crates.io/api/v1/crates/kaizen-cli/versions?per_page=100')"
          VERS="$(printf '%s' "${CRATE_JSON}" | jq -r '.versions[].num')"
          test -n "${VERS}"
          printf '%s\n' "${VERS}"
          for ver in ${VERS}; do
            printf 'yanking %s\n' "${ver}"
            cargo yank --vers "${ver}" kaizen-cli
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
