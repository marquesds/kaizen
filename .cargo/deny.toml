# cargo-deny config. Run: `cargo deny check -c .cargo/deny.toml` (from repo root).
#
# License allow-list kept tight: AGPL-3.0-or-later for kaizen, MIT / Apache / BSD
# / Unicode for transitive deps. Additions need review.

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
allow = [
    "AGPL-3.0-or-later",
    "AGPL-3.0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
